<!DOCTYPE html>
<html lang="ja">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
   <title>Green Striker - Mobile Edition</title>
   <style>
       :root {
           --bg-color: #010103;
           --player-color: #00ff44;
           --enemy-color: #ff2222;
           --euphoria-color: #ff00ff;
           --ai-color: #bb86fc;
           --ult-color: #ffeb3b;
           --score-color: #00e5ff;
       }

       body {
           margin: 0;
           padding: 0;
           background-color: #000;
           color: white;
           font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
           overflow: hidden;
           display: flex;
           justify-content: center;
           align-items: center;
           height: 100vh;
           touch-action: none; /* スクロール禁止 */
       }

       #game-screen {
           position: relative;
           width: 100vw;
           height: 100vh;
           max-width: 600px;
           max-height: 900px;
           background: var(--bg-color);
           overflow: hidden;
           border: 2px solid #333;
           box-sizing: border-box;
       }

       canvas {
           display: block;
           width: 100%;
           height: 100%;
       }

       /* --- UI Layers --- */
       .ui-layer {
           position: absolute;
           z-index: 20;
           pointer-events: none;
       }

       .hp-container {
           position: absolute;
           left: 10px;
           width: 15px;
           height: 180px;
           background: rgba(255, 255, 255, 0.05);
           border: 1px solid rgba(255, 255, 255, 0.2);
           border-radius: 4px;
           display: flex;
           flex-direction: column-reverse;
       }

       .hp-fill { width: 100%; height: 100%; transition: height 0.1s linear; }
       #boss-ui { top: 20px; }
       #boss-hp-fill { background: linear-gradient(0deg, #ff0000, #ff5555); box-shadow: 0 0 10px #ff0000; }
       #player-ui { bottom: 200px; }
       #player-hp-fill { background: linear-gradient(0deg, var(--player-color), #ffffff); box-shadow: 0 0 10px var(--player-color); }

       /* --- Side Status --- */
       #side-status-container {
           position: absolute;
           top: 10px;
           right: 10px;
           display: flex;
           flex-direction: column;
           align-items: flex-end;
           gap: 10px;
           z-index: 25;
           pointer-events: none;
       }
       #current-score { font-size: 20px; color: var(--score-color); text-shadow: 0 0 10px var(--score-color); }
       #ult-gauge-container { width: 120px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
       #ult-gauge-fill { height: 100%; width: 0%; background: var(--ult-color); }
       #ult-gauge-fill.ready { animation: ready-glow 1.5s linear infinite; }
       @keyframes ready-glow { 0% { background: #fff; } 50% { background: var(--ult-color); } 100% { background: #fff; } }

       /* --- Mobile Controls --- */
       #controls-layer {
           position: absolute;
           bottom: 30px;
           width: 100%;
           display: flex;
           justify-content: space-between;
           padding: 0 30px;
           box-sizing: border-box;
           z-index: 100;
           pointer-events: none;
       }

       #joystick-area {
           width: 120px;
           height: 120px;
           background: rgba(255, 255, 255, 0.05);
           border-radius: 50%;
           position: relative;
           pointer-events: auto;
           border: 1px solid rgba(255, 255, 255, 0.1);
       }
       #joystick-stick {
           width: 50px;
           height: 50px;
           background: rgba(255, 255, 255, 0.2);
           border-radius: 50%;
           position: absolute;
           top: 35px;
           left: 35px;
           pointer-events: none;
       }

       .action-btns {
           display: flex;
           flex-direction: column;
           gap: 15px;
           pointer-events: auto;
       }
       .touch-btn {
           width: 65px;
           height: 65px;
           background: rgba(255, 255, 255, 0.1);
           border: 2px solid rgba(255, 255, 255, 0.3);
           border-radius: 50%;
           display: flex;
           justify-content: center;
           align-items: center;
           font-size: 14px;
           font-weight: bold;
           color: white;
           -webkit-tap-highlight-color: transparent;
       }
       #btn-ult.ready { border-color: var(--ult-color); color: var(--ult-color); box-shadow: 0 0 15px var(--ult-color); }

       /* --- Modals --- */
       #selection-screen, .modal {
           position: absolute; top: 0; left: 0; width: 100%; height: 100%;
           background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column;
           justify-content: center; align-items: center; z-index: 1000; text-align: center;
       }
       .ship-card {
           width: 80%; padding: 15px; margin: 10px; background: rgba(255,255,255,0.05);
           border: 1px solid #444; border-radius: 8px;
       }
       .btn { padding: 12px 30px; background: white; color: black; border: none; border-radius: 4px; font-weight: bold; margin-top: 20px; }

       #stage-display { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 18px; opacity: 0.5; }
   </style>
</head>
<body>

   <div id="game-screen">
       <canvas id="gameCanvas"></canvas>

       <div id="stage-display">STAGE 1</div>

       <div id="side-status-container">
           <div id="current-score">0</div>
           <div id="weapon-name" style="font-size: 12px; color: var(--player-color);">NORMAL</div>
           <div id="ult-gauge-container"><div id="ult-gauge-fill"></div></div>
       </div>

       <div id="boss-ui" class="hp-container ui-layer"><div id="boss-hp-fill" class="hp-fill"></div></div>
       <div id="player-ui" class="hp-container ui-layer"><div id="player-hp-fill" class="hp-fill"></div></div>

       <div id="controls-layer">
           <div id="joystick-area"><div id="joystick-stick"></div></div>
           <div class="action-btns">
               <div class="touch-btn" id="btn-ult">ULT</div>
               <div class="touch-btn" id="btn-weapon">WPN</div>
           </div>
       </div>

       <div id="selection-screen">
           <h3>SELECT CRAFT</h3>
           <div class="ship-card" onclick="selectShip('ATTACK')"><b style="color:#ff4444">ATTACK</b><br><small>火力特化 / ULT: 攻撃1.5倍</small></div>
           <div class="ship-card" onclick="selectShip('SPEED')"><b style="color:#4444ff">SPEED</b><br><small>回避特化 / ULT: 完全無敵</small></div>
           <div class="ship-card" onclick="selectShip('HP')"><b style="color:#00ff44">TANK</b><br><small>耐久特化 / ULT: 高速回復</small></div>
       </div>

       <div id="victory-screen" class="modal" style="display:none">
           <h2 id="vic-title">MISSION CLEAR</h2>
           <div id="vic-result-body"></div>
           <button class="btn" onclick="proceedToNextStage()">NEXT STAGE</button>
       </div>

       <div id="gameover-screen" class="modal" style="display:none">
           <h2>MISSION FAILED</h2>
           <button class="btn" onclick="resetGame()">RETRY</button>
       </div>
   </div>

   <script>
       const canvas = document.getElementById('gameCanvas');
       const ctx = canvas.getContext('2d');
       const WIDTH = 600, HEIGHT = 900;
       canvas.width = WIDTH; canvas.height = HEIGHT;

       // Game State
       let gameState = 'SELECT', frame = 0, currentStage = 1, totalScore = 0;
       let joyX = 0, joyY = 0, mousePressed = false, mouseX = 0, mouseY = 0;
       const keys = {};

       const player = {
           x: WIDTH / 2, y: HEIGHT - 250, radius: 8, hitbox: 3.5, speed: 6,
           hp: 100, maxHp: 100, color: '#00ff44', damageMult: 1.0,
           shotTimer: 0, weaponType: 0, type: 'NORMAL',
           ultGauge: 0, ultActive: false, ultTimer: 0
       };

       const boss = { x: WIDTH / 2, y: 150, hp: 1200, maxHp: 1200, radius: 60, targetX: WIDTH / 2 };
       const weaponConfigs = [
           { name: "NORMAL", interval: 7, dmg: 10, speed: 18 },
           { name: "MISSILE", interval: 25, dmg: 80, speed: 8 },
           { name: "SPREAD", interval: 10, dmg: 6, speed: 15 }
       ];

       let bullets = [], effects = [], minions = [];
       const ULT_MAX = 2500;

       // --- Input Handling ---
       const joyStick = document.getElementById('joystick-stick');
       const joyArea = document.getElementById('joystick-area');

       function handleTouch(e) {
           e.preventDefault();
           const touch = e.touches[0];
           const rect = joyArea.getBoundingClientRect();
           const centerX = rect.left + rect.width / 2;
           const centerY = rect.top + rect.height / 2;
           const dist = Math.min(50, Math.hypot(touch.clientX - centerX, touch.clientY - centerY));
           const angle = Math.atan2(touch.clientY - centerY, touch.clientX - centerX);
           joyX = (Math.cos(angle) * dist) / 50;
           joyY = (Math.sin(angle) * dist) / 50;
           joyStick.style.transform = `translate(${joyX * 35}px, ${joyY * 35}px)`;
       }

       joyArea.addEventListener('touchstart', handleTouch);
       joyArea.addEventListener('touchmove', handleTouch);
       joyArea.addEventListener('touchend', () => { joyX = 0; joyY = 0; joyStick.style.transform = 'translate(0,0)'; });

       // Shooting touch
       canvas.addEventListener('touchstart', (e) => { mousePressed = true; updateMouse(e); });
       canvas.addEventListener('touchmove', (e) => { updateMouse(e); });
       canvas.addEventListener('touchend', () => { mousePressed = false; });
       
       function updateMouse(e) {
           const rect = canvas.getBoundingClientRect();
           const t = e.touches[0];
           mouseX = (t.clientX - rect.left) * (WIDTH / rect.width);
           mouseY = (t.clientY - rect.top) * (HEIGHT / rect.height);
       }

       document.getElementById('btn-ult').addEventListener('touchstart', (e) => { e.preventDefault(); activateUltimate(); });
       document.getElementById('btn-weapon').addEventListener('touchstart', (e) => {
           e.preventDefault(); player.weaponType = (player.weaponType + 1) % 3;
           document.getElementById('weapon-name').textContent = weaponConfigs[player.weaponType].name;
       });

       // Keyboard Support
       window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
       window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

       // --- Core Logic ---
       function selectShip(type) {
           player.type = type;
           if(type==='ATTACK') { player.damageMult = 1.6; player.color = '#ff4444'; player.maxHp = 100; }
           if(type==='SPEED') { player.speed = 9; player.color = '#4444ff'; player.maxHp = 130; player.hitbox = 2; }
           if(type==='HP') { player.speed = 4.5; player.color = '#00ff44'; player.maxHp = 200; }
           player.hp = player.maxHp;
           document.documentElement.style.setProperty('--player-color', player.color);
           document.getElementById('selection-screen').style.display = 'none';
           gameState = 'PLAYING';
       }

       function activateUltimate() {
           if (player.ultGauge < ULT_MAX || player.ultActive) return;
           player.ultActive = true; player.ultGauge = 0;
           player.ultTimer = player.type === 'ATTACK' ? 600 : (player.type === 'SPEED' ? 300 : 180);
           updateUI();
       }

       function updateUI() {
           document.getElementById('boss-hp-fill').style.height = (boss.hp / boss.maxHp * 100) + '%';
           document.getElementById('player-hp-fill').style.height = (player.hp / player.maxHp * 100) + '%';
           document.getElementById('current-score').textContent = Math.floor(totalScore);
           const ultPer = Math.min(100, (player.ultGauge / ULT_MAX) * 100);
           const fill = document.getElementById('ult-gauge-fill');
           fill.style.width = ultPer + '%';
           if(ultPer>=100) fill.classList.add('ready'); else fill.classList.remove('ready');
       }

       function update() {
           if (gameState !== 'PLAYING') return;
           frame++;

           // Movement
           let mx = joyX; let my = joyY;
           if(keys['w']) my = -1; if(keys['s']) my = 1; if(keys['a']) mx = -1; if(keys['d']) mx = 1;
           player.x += mx * player.speed; player.y += my * player.speed;
           player.x = Math.max(20, Math.min(WIDTH-20, player.x));
           player.y = Math.max(400, Math.min(HEIGHT-100, player.y));

           // Shooting
           if (mousePressed && frame > player.shotTimer) {
               const conf = weaponConfigs[player.weaponType];
               const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
               let dmg = conf.dmg * player.damageMult;
               if(player.ultActive && player.type === 'ATTACK') dmg *= 1.5;
               
               bullets.push({x: player.x, y: player.y, vx: Math.cos(angle)*conf.speed, vy: Math.sin(angle)*conf.speed, color: player.color, radius: 5, isPlayer: true, damage: dmg});
               player.shotTimer = frame + conf.interval;
           }

           // Ult Logic
           if(player.ultActive) {
               player.ultTimer--;
               if(player.type === 'HP') player.hp = Math.min(player.maxHp, player.hp + 0.5);
               if(player.ultTimer <= 0) player.ultActive = false;
           }

           // Boss & Bullets
           boss.x += (boss.targetX - boss.x) * 0.03;
           if(frame % 100 === 0) boss.targetX = 100 + Math.random()*(WIDTH-200);

           if(frame % 20 === 0) {
               const a = frame * 0.05;
               bullets.push({x: boss.x, y: boss.y, vx: Math.cos(a)*4, vy: Math.sin(a)*4, color: '#ff2222', radius: 6, isPlayer: false, damage: 10});
           }

           for(let i=bullets.length-1; i>=0; i--) {
               const b = bullets[i]; b.x += b.vx; b.y += b.vy;
               if(b.y < 0 || b.y > HEIGHT) { bullets.splice(i,1); continue; }

               if(b.isPlayer) {
                   if(Math.hypot(b.x-boss.x, b.y-boss.y) < boss.radius) {
                       boss.hp -= b.damage; totalScore += b.damage * 5;
                       if(!player.ultActive) player.ultGauge += b.damage;
                       bullets.splice(i,1);
                       if(boss.hp <= 0) { gameState = 'VICTORY'; document.getElementById('victory-screen').style.display = 'flex'; }
                   }
               } else {
                   if(!(player.ultActive && player.type === 'SPEED') && Math.hypot(b.x-player.x, b.y-player.y) < player.hitbox + b.radius) {
                       player.hp -= b.damage; bullets.splice(i,1);
                       if(player.hp <= 0) { gameState = 'GAMEOVER'; document.getElementById('gameover-screen').style.display = 'flex'; }
                   }
               }
           }
           updateUI();
       }

       function draw() {
           ctx.fillStyle = '#010105'; ctx.fillRect(0,0,WIDTH,HEIGHT);
           
           // Player
           ctx.fillStyle = player.color;
           ctx.beginPath(); ctx.moveTo(player.x, player.y-20); ctx.lineTo(player.x-15, player.y+10); ctx.lineTo(player.x+15, player.y+10); ctx.fill();
           if(player.ultActive) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); }

           // Boss
           ctx.fillStyle = '#331111'; ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.radius, 0, Math.PI*2); ctx.fill();
           ctx.fillStyle = '#ff2222'; ctx.beginPath(); ctx.arc(boss.x, boss.y, 20, 0, Math.PI*2); ctx.fill();

           // Bullets
           bullets.forEach(b => {
               ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
           });
       }

       function loop() { update(); draw(); requestAnimationFrame(loop); }
       loop();

       function proceedToNextStage() {
           currentStage++;
           boss.maxHp += 1000; boss.hp = boss.maxHp;
           player.hp = player.maxHp;
           bullets = [];
           document.getElementById('victory-screen').style.display = 'none';
           document.getElementById('stage-display').textContent = 'STAGE ' + currentStage;
           gameState = 'PLAYING';
       }

       function resetGame() { location.reload(); }
   </script>
</body>
</html>
